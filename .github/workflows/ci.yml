name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace -- -D warnings
      - name: test
        run: cargo test --workspace

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend deps
        run: npm ci --prefix frontend
      - name: Build frontend
        run: npm run build --prefix frontend

  tauri-build-linux:
    runs-on: ubuntu-latest
    needs: [rust-checks, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install Tauri CLI
        run: npm install --prefix frontend @tauri-apps/cli@^2
      - name: Install frontend deps
        run: npm ci --prefix frontend
      - name: Build Tauri app
        run: npx --prefix frontend tauri build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: racoon-typper-linux
          path: target/release/racoon-app

  tauri-build-windows:
    runs-on: windows-latest
    needs: [rust-checks, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Tauri CLI
        run: npm install --prefix frontend @tauri-apps/cli@^2
      - name: Install frontend deps
        run: npm ci --prefix frontend
      - name: Build Tauri app
        run: npx --prefix frontend tauri build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: racoon-typper-windows
          path: target/release/racoon-app.exe