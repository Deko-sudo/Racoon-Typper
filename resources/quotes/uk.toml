[[quotes]]
text = "Що посієш, те й пожнеш."
author = "Прислів'я"

[[quotes]]
text = "Без праці нема й плода."
author = "Прислів'я"

[[quotes]]
text = "Сім разів відміряй, один раз відріж."
author = "Прислів'я"

[[quotes]]
text = "Краще пізно, ніж ніколи."
author = "Прислів'я"

[[quotes]]
text = "Хто рано встає, тому Бог дає."
author = "Прислів'я"

[[quotes]]
text = "Повторення — мати навчання."
author = "Прислів'я"

[[quotes]]
text = "Не відкладай на завтра те, що можна зробити сьогодні."
author = "Прислів'я"

[[quotes]]
text = "За двома зайцями погонишся — жодного не спіймаєш."
author = "Прислів'я"

[[quotes]]
text = "Слово — не горобець, вилетить — не впіймаєш."
author = "Прислів'я"

[[quotes]]
text = "Береженого Бог береже."
author = "Прислів'я"

[[quotes]]
text = "Хто знає, той і перемагає."
author = "Прислів'я"

[[quotes]]
text = "Дружба міцніша за камінь."
author = "Прислів'я"

[[quotes]]
text = "Ранок вечора мудріший."
author = "Прислів'я"

[[quotes]]
text = "Вік живи — вік учись."
author = "Прислів'я"

[[quotes]]
text = "Коні вмирають від праці, а люди від туги."
author = "Григорій Сковорода"