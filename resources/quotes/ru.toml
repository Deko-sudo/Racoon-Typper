[[quotes]]
text = "Терпение и труд всё перетрут."
author = "Пословица"

[[quotes]]
text = "Без труда не вытащишь и рыбку из пруда."
author = "Пословица"

[[quotes]]
text = "Семь раз отмерь, один раз отрежь."
author = "Пословица"

[[quotes]]
text = "Делу время, потехе час."
author = "Пословица"

[[quotes]]
text = "Чем дальше в лес, тем больше дров."
author = "Пословица"

[[quotes]]
text = "За двумя зайцами погонишься — ни одного не поймаешь."
author = "Пословица"

[[quotes]]
text = "Не откладывай на завтра то, что можно сделать сегодня."
author = "Пословица"

[[quotes]]
text = "Лучше один раз увидеть, чем сто раз услышать."
author = "Пословица"

[[quotes]]
text = "Тише едешь — дальше будешь."
author = "Пословица"

[[quotes]]
text = "Что посеешь, то и пожнёшь."
author = "Пословица"

[[quotes]]
text = "Слово — серебро, а молчание — золото."
author = "Пословица"

[[quotes]]
text = "Век живи — век учись."
author = "Пословица"

[[quotes]]
text = "Повторение — мать учения."
author = "Пословица"

[[quotes]]
text = "Рыба ищет где глубже, а человек — где лучше."
author = "Пословица"

[[quotes]]
text = "Не всё то золото, что блестит."
author = "Пословица"

[[quotes]]
text = "Чем бы дитя ни тешилось, лишь бы не плакало."
author = "Пословица"

[[quotes]]
text = "Берегись бед, пока их нет."
author = "Пословица"

[[quotes]]
text = "Где хотенье, там и уменье."
author = "Пословица"

[[quotes]]
text = "Кончил дело — гуляй смело."
author = "Пословица"

[[quotes]]
text = "Поспешишь — людей насмешишь."
author = "Пословица"