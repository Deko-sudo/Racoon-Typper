[[quotes]]
text = "No por mucho madrugar amanece más temprano."
author = "Refrán"

[[quotes]]
text = "A mal tiempo, buena cara."
author = "Refrán"

[[quotes]]
text = "Mejor tarde que nunca."
author = "Refrán"

[[quotes]]
text = "Quien no arriesga, no gana."
author = "Refrán"

[[quotes]]
text = "El que mucho abarca, poco aprieta."
author = "Refrán"

[[quotes]]
text = "No todo lo que reluce es oro."
author = "Refrán"

[[quotes]]
text = "A caballo regalado no se le miran los dientes."
author = "Refrán"

[[quotes]]
text = "Quien siembra vientos, recoge tempestades."
author = "Refrán"

[[quotes]]
text = "La unión hace la fuerza."
author = "Refrán"

[[quotes]]
text = "Más vale tarde que nunca."
author = "Refrán"

[[quotes]]
text = "Más vale pájaro en mano que ciento volando."
author = "Refrán"

[[quotes]]
text = "Dime con quién andas y te diré quién eres."
author = "Refrán"

[[quotes]]
text = "El que calla, otorga."
author = "Refrán"

[[quotes]]
text = "A Dios rogando y con el mazo dando."
author = "Refrán"

[[quotes]]
text = "No hay mal que por bien no venga."
author = "Refrán"