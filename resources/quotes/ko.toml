[[quotes]]
text = "천 리 길도 한 걸음부터."
author = "속담"

[[quotes]]
text = "티끌 모아 태산."
author = "속담"

[[quotes]]
text = "실패는 성공의 어머니."
author = "속담"

[[quotes]]
text = "늦었다고 생각할 때가 가장 빠른 때다."
author = "속담"

[[quotes]]
text = "아는 길도 물어가라."
author = "속담"

[[quotes]]
text = "백지장도 맞들면 낫다."
author = "속담"

[[quotes]]
text = "호랑이에게 물려가도 정신만 차리면 산다."
author = "속담"

[[quotes]]
text = "빈 수레가 요란하다."
author = "속담"

[[quotes]]
text = "윗물이 맑아야 아랫물이 맑다."
author = "속담"

[[quotes]]
text = "아는 것이 힘이다."
author = "속담"

[[quotes]]
text = "궁하면 통한다."
author = "속담"

[[quotes]]
text = "돌다리도 두들겨 보고 건너라."
author = "속담"

[[quotes]]
text = "낫 놓고 기역 자도 모른다."
author = "속담"

[[quotes]]
text = "말 한마디로 천 냥 빚을 갚는다."
author = "속담"

[[quotes]]
text = "콩 심은 데 콩 나고 팥 심은 데 팥 난다."
author = "속담"