[[quotes]]
text = "Quem não arrisca, não petisca."
author = "Provérbio"

[[quotes]]
text = "Mais vale tarde do que nunca."
author = "Provérbio"

[[quotes]]
text = "A pressa é inimiga da perfeição."
author = "Provérbio"

[[quotes]]
text = "A união faz a força."
author = "Provérbio"

[[quotes]]
text = "Nem tudo que reluz é ouro."
author = "Provérbio"

[[quotes]]
text = "A cavalo dado não se olham os dentes."
author = "Provérbio"

[[quotes]]
text = "Deus ajuda quem cedo madruga."
author = "Provérbio"

[[quotes]]
text = "Quem semeia ventos, colhe tempestades."
author = "Provérbio"

[[quotes]]
text = "O que os olhos não veem, o coração não sente."
author = "Provérbio"

[[quotes]]
text = "Antes só do que mal acompanhado."
author = "Provérbio"

[[quotes]]
text = "Diz-me com quem andas e eu te direi quem és."
author = "Provérbio"

[[quotes]]
text = "Quem cala, consente."
author = "Provérbio"

[[quotes]]
text = "Águas passadas não movem moinhos."
author = "Provérbio"

[[quotes]]
text = "O seguro morreu de velho."
author = "Provérbio"

[[quotes]]
text = "Devagar e sempre se chega ao fim."
author = "Provérbio"