[[quotes]]
text = "Cine sapă groapa altuia, cade în ea însuşi."
author = "Proverb"

[[quotes]]
text = "Mai târziu, dar niciodată."
author = "Proverb"

[[quotes]]
text = "Cine se culcă cu câinii, se scoală cu purici."
author = "Proverb"

[[quotes]]
text = "Mai bine mai târziu decât niciodată."
author = "Proverb"

[[quotes]]
text = "Cine nu munceşte, nu mănâncă."
author = "Proverb"

[[quotes]]
text = "Cine n-are, nu bea."
author = "Proverb"

[[quotes]]
text = "Capul plecat, sabia nu-l taie."
author = "Proverb"

[[quotes]]
text = "Unde e voie, nu e minte."
author = "Proverb"

[[quotes]]
text = "Cine nu riscă, nu câştigă."
author = "Proverb"

[[quotes]]
text = "Vorba lungă, sărăcia omului."
author = "Proverb"

[[quotes]]
text = "Grăunte la grăunte se face sacul."
author = "Proverb"

[[quotes]]
text = "Cine tacă, nu greşeşte."
author = "Proverb"

[[quotes]]
text = "Cine se laudă singur, face de râs."
author = "Proverb"

[[quotes]]
text = "Dragostea trece, foamea rămâne."
author = "Proverb"

[[quotes]]
text = "Cine aleargă după doi iepuri, nu prinde niciunul."
author = "Proverb"