[[quotes]]
text = "Petit à petit, l'oiseau fait son nid."
author = "Proverbe"

[[quotes]]
text = "Mieux vaut tard que jamais."
author = "Proverbe"

[[quotes]]
text = "Qui ne risque rien n'a rien."
author = "Proverbe"

[[quotes]]
text = "L'habit ne fait pas le moine."
author = "Proverbe"

[[quotes]]
text = "Il n'y a pas de fumée sans feu."
author = "Proverbe"

[[quotes]]
text = "Qui sème le vent récolte la tempête."
author = "Proverbe"

[[quotes]]
text = "L'union fait la force."
author = "Proverbe"

[[quotes]]
text = "À vaillant cœur rien d'impossible."
author = "Proverbe"

[[quotes]]
text = "Paris ne s'est pas fait en un jour."
author = "Proverbe"

[[quotes]]
text = "Qui vivra verra."
author = "Proverbe"

[[quotes]]
text = "Tel père, tel fils."
author = "Proverbe"

[[quotes]]
text = "Les murs ont des oreilles."
author = "Proverbe"

[[quotes]]
text = "Mieux vaut prévenir que guérir."
author = "Proverbe"

[[quotes]]
text = "À chaque jour suffit sa peine."
author = "Proverbe"

[[quotes]]
text = "La patience vient à bout de tout."
author = "Proverbe"