[[quotes]]
text = "千里の道も一歩から。"
author = "諺"

[[quotes]]
text = "石の上にも三年。"
author = "諺"

[[quotes]]
text = "継続は力なり。"
author = "諺"

[[quotes]]
text = "失敗は成功の基。"
author = "諺"

[[quotes]]
text = "一期一会。"
author = "茶道の心得"

[[quotes]]
text = "花鳥風月。"
author = "諺"

[[quotes]]
text = "百聞は一見に如かず。"
author = "諺"

[[quotes]]
text = "猿も木から落ちる。"
author = "諺"

[[quotes]]
text = "明日は明日の風が吹く。"
author = "諺"

[[quotes]]
text = "転石苔を生ぜず。"
author = "諺"

[[quotes]]
text = "早起きは三文の徳。"
author = "諺"

[[quotes]]
text = "果報は寝て待て。"
author = "諺"

[[quotes]]
text = "犬も歩けば棒に当たる。"
author = "諺"

[[quotes]]
text = "蛙の面に水。"
author = "諺"

[[quotes]]
text = "郷に入っては郷に従え。"
author = "諺"