[[quotes]]
text = "Chi va piano va sano e va lontano."
author = "Proverbio"

[[quotes]]
text = "L'unione fa la forza."
author = "Proverbio"

[[quotes]]
text = "Meglio tardi che mai."
author = "Proverbio"

[[quotes]]
text = "Non è tutto oro quel che luccica."
author = "Proverbio"

[[quotes]]
text = "Chi dorme non piglia pesci."
author = "Proverbio"

[[quotes]]
text = "A caval donato non si guarda in bocca."
author = "Proverbio"

[[quotes]]
text = "La pratica vale più della grammatica."
author = "Proverbio"

[[quotes]]
text = "Chi la dura, la vince."
author = "Proverbio"

[[quotes]]
text = "Il mattino ha l'oro in bocca."
author = "Proverbio"

[[quotes]]
text = "Tutto il mondo è paese."
author = "Proverbio"

[[quotes]]
text = "Tra il dire e il fare c'è di mezzo il mare."
author = "Proverbio"

[[quotes]]
text = "Chi semina vento raccoglie tempesta."
author = "Proverbio"

[[quotes]]
text = "Non si fa mai nulla senza volerlo."
author = "Proverbio"

[[quotes]]
text = "L'acqua cheta rovina i ponti."
author = "Proverbio"

[[quotes]]
text = "Chi troppo vuole, nulla stringe."
author = "Proverbio"