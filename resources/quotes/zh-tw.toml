[[quotes]]
text = "千里之行，始於足下。"
author = "老子"

[[quotes]]
text = "失敗為成功之母。"
author = "諺語"

[[quotes]]
text = "有志者事竟成。"
author = "諺語"

[[quotes]]
text = "一分耕耘，一分收穫。"
author = "諺語"

[[quotes]]
text = "不怕慢，只怕站。"
author = "諺語"

[[quotes]]
text = "學而時習之，不亦說乎。"
author = "孔子"

[[quotes]]
text = "天下無難事，只怕有心人。"
author = "諺語"

[[quotes]]
text = "玉不琢，不成器。"
author = "三字經"

[[quotes]]
text = "吃得苦中苦，方為人上人。"
author = "諺語"

[[quotes]]
text = "近朱者赤，近墨者黑。"
author = "諺語"

[[quotes]]
text = "讀萬卷書，行萬里路。"
author = "諺語"

[[quotes]]
text = "三人行，必有我師焉。"
author = "孔子"

[[quotes]]
text = "不積跬步，無以至千里。"
author = "荀子"

[[quotes]]
text = "路遙知馬力，日久見人心。"
author = "諺語"

[[quotes]]
text = "百聞不如一見。"
author = "諺語"