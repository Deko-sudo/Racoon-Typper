[[quotes]]
text = "Wer andere kennt, ist klug. Wer sich selbst kennt, ist weise."
author = "Laozi"

[[quotes]]
text = "Eile mit Weile."
author = "Augustus"

[[quotes]]
text = "Was du heute kannst besorgen, das verschiebe nicht auf morgen."
author = "Sprichwort"

[[quotes]]
text = "Übung macht den Meister."
author = "Sprichwort"

[[quotes]]
text = "Morgenstund hat Gold im Mund."
author = "Sprichwort"

[[quotes]]
text = "Ohne Fleiß kein Preis."
author = "Sprichwort"

[[quotes]]
text = "Wer A sagt, muss auch B sagen."
