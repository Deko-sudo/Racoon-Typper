[[modules]]
id = "ru_m6"
name = "Предложения"
difficulty = "intermediate"
order = 6

[[modules.lessons]]
id = "ru_m6_l1"
name = "Короткие предложения"
text = "кошка сидит на ковре. собака бежит быстро. мы пошли домой. было весело."

[[modules.lessons]]
id = "ru_m6_l2"
name = "Средние предложения"
text = "быстрая рыжая лиса прыгает через ленивую собаку каждый день без усталости."

[[modules.lessons]]
id = "ru_m6_l3"
name = "Вопросы"
text = "как тебя зовут? где ты живёшь? как дела сегодня? почему небо голубое?"

[[modules.lessons]]
id = "ru_m6_l4"
name = "Сложные предложения"
text = "несмотря на дождь, мы решили пойти гулять в парк, потому что воздух был свежим и чистым."

[[modules.lessons]]
id = "ru_m6_l5"
name = "Абзац"
text = "повторение — мать учения. чем больше печатаешь, тем быстрее становишься. держи пальцы на основном ряду и смотри на экран, а не на клавиатуру."

[[modules]]
id = "ru_m7"
name = "Пунктуация"
difficulty = "advanced"
order = 7

[[modules.lessons]]
id = "ru_m7_l1"
name = "Точки и запятые"
text = "привет, мир. пока, друг. один, два, три. четыре, пять, шесть."

[[modules.lessons]]
id = "ru_m7_l2"
name = "Вопросительные знаки"
text = "как дела? который час? куда идём? кто этот человек?"

[[modules.lessons]]
id = "ru_m7_l3"
name = "Восклицательные знаки"
text = "вау! потрясающе! невероятно! фантастика! отлично! великолепно! прекрасно! чудесно!"

[[modules.lessons]]
id = "ru_m7_l4"
name = "Смешанная пунктуация"
text = "кошка, собака и птица пошли гулять. что за зрелище! им было весело."

[[modules.lessons]]
id = "ru_m7_l5"
name = "Кавычки"
text = "она сказала: привет! он ответил: как дела? они засмеялись: какая шутка!"

[[modules]]
id = "ru_m8"
name = "Свободная практика"
difficulty = "advanced"
order = 8

[[modules.lessons]]
id = "ru_m8_l1"
name = "Длинный текст 1"
text = "путь в тысячу миль начинается с одного шага. каждый эксперт когда-то был новичком. практика — ключ к мастерству. продолжай печатать, продолжай учиться, продолжай расти."

[[modules.lessons]]
id = "ru_m8_l2"
name = "Длинный текст 2"
text = "слепая печать — это умение печатать не глядя на клавиатуру. это требует практики, терпения и упорства. начни с основного ряда и постепенно расширяй до других клавиш."

[[modules.lessons]]
id = "ru_m8_l3"
name = "Длинный текст 3"
text = "скорость приходит после точности. не торопись. сосредоточься на правильных клавишах. скорость придёт естественно, когда мышечная память разовьётся со временем при постоянной практике."

[[modules.lessons]]
id = "ru_m8_l4"
name = "Длинный текст 4"
text = "быстрая рыжая лиса прыгает через ленивую собаку. эй, жлоб! орёл под тёмным небом. чудо-юдо рыба-кит палку съел."

[[modules.lessons]]
id = "ru_m8_l5"
name = "Финальный вызов"
text = "успех не окончателен, неудача не фатальна: это мужество продолжать, что имеет значение. единственный способ делать великую работу — любить то, что делаешь. верь в себя — и ты уже на полпути."