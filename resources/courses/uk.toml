[[modules]]
id = "uk_m5"
name = "Речення"
difficulty = "intermediate"
order = 5

[[modules.lessons]]
id = "uk_m5_l1"
name = "Короткі речення"
text = "кіт спить на килимку. собака біжить швидко. ми пішли додому."

[[modules.lessons]]
id = "uk_m5_l2"
name = "Середні речення"
text = "швидка руда лисиця стрибає через ледачого пса щодня без втоми."

[[modules.lessons]]
id = "uk_m5_l3"
name = "Питання"
text = "як тебе звати? де ти живеш? як сьогодні справи? чому небо блакитне?"

[[modules.lessons]]
id = "uk_m5_l4"
name = "Складні речення"
text = "незважаючи на дощ, ми вирішили піти гуляти в парк, тому що повітря було свіжим."

[[modules.lessons]]
id = "uk_m5_l5"
name = "Абзац"
text = "повторення — мати навчання. чим більше друкуєш, тим швидше стаєш. тримай пальці на основному ряду й дивись на екран."