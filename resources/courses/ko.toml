text = "빠른 갈색 여우가 게으른 개를 뛰어넘는다 매일 그렇다."

[[modules.lessons]]
id = "ko_m3_l3"
name = "질문"
text = "이름이 무엇인가요? 어디에 사나요? 오늘 어떤가요? 하늘은 왜 파란가요?"

[[modules.lessons]]
id = "ko_m3_l4"
name = "복잡한 문장"
text = "비가 왔음에도 불구하고 공기가 상쾌해서 공원에 가기로 했다."

[[modules.lessons]]
id = "ko_m3_l5"
name = "단락"
text = "연습이 완벽을 만든다. 더 많이 칠수록 더 빨라진다. 손가락을 기본 자리에 두고 화면을 보라."