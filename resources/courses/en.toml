[[modules]]
id = "en_m8"
name = "Free Practice"
difficulty = "advanced"
order = 8

[[modules.lessons]]
id = "en_m8_l1"
name = "Long Text 1"
text = "the journey of a thousand miles begins with a single step. every expert was once a beginner. practice is the key to mastery. keep typing, keep learning, keep growing."

[[modules.lessons]]
id = "en_m8_l2"
name = "Long Text 2"
text = "touch typing is the ability to type without looking at the keyboard. it requires practice, patience, and persistence. start with the home row and gradually expand to other keys."

[[modules.lessons]]
id = "en_m8_l3"
name = "Long Text 3"
text = "speed comes with accuracy first. do not rush. focus on hitting the right keys. speed will follow naturally as your muscle memory develops over time with consistent practice."

[[modules.lessons]]
id = "en_m8_l4"
name = "Long Text 4"
text = "the quick brown fox jumps over the lazy dog. pack my box with five dozen liquor jugs. how vexingly quick daft zebras jump. the five boxing wizards jump quickly."

[[modules.lessons]]
id = "en_m8_l5"
name = "Final Challenge"
text = "success is not final, failure is not fatal: it is the courage to continue that counts. the only way to do great work is to love what you do. believe you can and you are halfway there."