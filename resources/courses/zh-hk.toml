text = "雖然下雨了，但我們決定去公園散步，因為空氣很清新。"

[[modules.lessons]]
id = "zh-hk_m3_l5"
name = "段落"
text = "熟能生巧。你打得越多，就會越快。手指放在基本鍵上，眼睛看着屏幕。"